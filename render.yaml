services:
  - type: web
    name: zenith-ai-copilot
    env: node
    buildCommand: npm install && npm install --prefix server && npm run build
    startCommand: npm start
    envVars:
      - key: FEATHERLESS_API_KEY
        sync: false # User will fill this in Render Dashboard
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
